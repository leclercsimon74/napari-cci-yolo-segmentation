# This workflows will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries
name: tests

on:
  push:
    branches:
      - main
      - npe2
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10
  pull_request:
    branches:
      - main
      - npe2
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} • py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install system Qt dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y -q
          sudo apt-get install -y -q libglib2.0-0 libgl1 libxkbcommon-x11-0 \
            libdbus-1-3 xvfb libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0

      - name: Install napari with Qt backend and testing extras
        run: python -m pip install "napari[qt]" && python -m pip install -e ".[testing]"

      - name: Run tests (Linux – headless via xvfb)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
          QT_QUICK_BACKEND: software
          NAPARI_TESTING: "1"
        run: xvfb-run --auto-servernum python -m pytest tests/ -v

      - name: Run tests (Windows / macOS)
        if: runner.os != 'Linux'
        run: python -m pytest tests/ -v

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build .
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
